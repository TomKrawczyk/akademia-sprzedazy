<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Akademia Sprzedaży Call Center — 4ECO</title>
<style>
:root{
  --navy:#0B1437; --navy2:#1a2a5e; --green:#22c55e; --green-d:#16a34a;
  --bg:#f4f6fb; --card:#ffffff; --ink:#1a2233; --muted:#5b6472;
  --line:#e2e8f2; --soft:#f0fdf4; --soft-b:#bbf7d0;
  --amber:#fef3c7; --amber-b:#fbbf24; --sky:#eff6ff; --sky-b:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
a{color:inherit}

/* Layout */
.wrap{display:flex;min-height:100vh}
.sidebar{width:310px;background:var(--navy);color:#e6ebf5;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;padding:0 0 40px;z-index:20;transition:transform .25s}
.sidebar-head{padding:22px 22px 16px;border-bottom:1px solid rgba(255,255,255,.12);position:sticky;top:0;background:var(--navy);z-index:2}
.logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.logo .leaf{width:30px;height:30px;background:var(--green);border-radius:8px 8px 8px 2px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo small{display:block;font-weight:400;font-size:11px;color:#9db0d6;margin-top:2px}
.nav-part{padding:16px 14px 4px;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#7f94bf;font-weight:700}
.nav a{display:block;padding:8px 22px;color:#c3cee6;text-decoration:none;font-size:13.5px;border-left:3px solid transparent;transition:.15s}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:rgba(34,197,94,.14);border-left-color:var(--green);color:#fff;font-weight:600}

.main{margin-left:310px;flex:1;min-width:0}
.progress-bar{position:fixed;top:0;left:310px;right:0;height:4px;background:rgba(11,20,55,.08);z-index:30}
.progress-bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--green-d));transition:width .2s}
.content{max-width:860px;margin:0 auto;padding:60px 40px 120px}

/* Hero */
.hero{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:20px;padding:44px 40px;margin-bottom:34px;box-shadow:0 20px 50px -20px rgba(11,20,55,.5)}
.hero h1{font-size:30px;line-height:1.2;margin-bottom:14px}
.hero p{color:#c3cee6;font-size:15px;max-width:640px}
.hero .chips{margin-top:20px;display:flex;flex-wrap:wrap;gap:8px}
.chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);padding:5px 12px;border-radius:20px;font-size:12px;color:#e6ebf5}
.hero .stat-row{margin-top:26px;display:flex;gap:26px;flex-wrap:wrap}
.hero .stat b{display:block;font-size:26px;color:var(--green)}
.hero .stat span{font-size:12px;color:#9db0d6}

/* Sections */
.module{display:none;animation:fade .35s ease}
.module.show{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.eyebrow{display:inline-block;background:var(--soft);color:var(--green-d);font-weight:700;font-size:12px;padding:5px 12px;border-radius:20px;margin-bottom:12px;border:1px solid var(--soft-b)}
.module h2{font-size:26px;color:var(--navy);margin-bottom:8px;line-height:1.25}
.module .lede{color:var(--muted);font-size:15.5px;margin-bottom:24px}
.module h3{font-size:18px;color:var(--navy);margin:30px 0 12px;display:flex;align-items:center;gap:9px}
.module h3::before{content:"";width:5px;height:20px;background:var(--green);border-radius:3px}
.module h4{font-size:15px;color:var(--navy);margin:20px 0 8px}
.module p{margin:11px 0;color:#28303f}
.module ul,.module ol{margin:11px 0 11px 20px}
.module li{margin:6px 0}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin:18px 0;box-shadow:0 4px 14px -8px rgba(11,20,55,.12)}

/* Special blocks */
.quote{border-left:4px solid var(--green);background:var(--soft);padding:14px 18px;border-radius:0 10px 10px 0;margin:18px 0;color:#14532d;font-size:14.5px}
.quote b{color:var(--green-d)}
.psy{border-left:4px solid var(--sky-b);background:var(--sky);padding:14px 18px;border-radius:0 10px 10px 0;margin:18px 0;font-size:14px}
.psy b{color:var(--sky-b)}
.warn{border-left:4px solid var(--amber-b);background:var(--amber);padding:14px 18px;border-radius:0 10px 10px 0;margin:18px 0;font-size:14px;color:#78350f}

/* Dialogue / scenka */
.scene{background:#0e1730;border-radius:14px;padding:6px 4px;margin:18px 0;overflow:hidden}
.scene-title{color:#9db0d6;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:12px 18px 6px}
.bubble{margin:8px 16px;padding:10px 14px;border-radius:14px;font-size:14px;max-width:82%;line-height:1.5}
.bubble.k{background:#233458;color:#dbe4f7;border-bottom-left-radius:3px}
.bubble.c{background:var(--green);color:#04240f;margin-left:auto;border-bottom-right-radius:3px}
.bubble .who{display:block;font-size:10.5px;opacity:.7;margin-bottom:2px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.scene .note{color:#7f94bf;font-size:12px;font-style:italic;padding:4px 20px 12px}

/* Accordion */
.acc{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;background:var(--card)}
.acc-h{padding:14px 18px;cursor:pointer;font-weight:600;color:var(--navy);display:flex;justify-content:space-between;align-items:center;font-size:14.5px;user-select:none}
.acc-h:hover{background:#f8fafc}
.acc-h .ico{color:var(--green);transition:transform .2s;font-size:18px}
.acc.open .acc-h .ico{transform:rotate(45deg)}
.acc-b{max-height:0;overflow:hidden;transition:max-height .3s ease;padding:0 18px}
.acc.open .acc-b{max-height:1400px;padding:0 18px 16px}

/* table */
.tbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:13.5px;overflow:hidden;border-radius:10px}
.tbl th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left}
.tbl td{border:1px solid var(--line);padding:9px 12px;vertical-align:top}
.tbl tr:nth-child(even) td{background:#f8fafc}

/* callout tiles */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:18px 0}
.tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.tile .big{font-size:22px;font-weight:700;color:var(--green-d)}
.tile .lbl{font-size:12.5px;color:var(--muted);margin-top:3px}

/* footer nav */
.pager{display:flex;justify-content:space-between;gap:12px;margin-top:44px;padding-top:24px;border-top:1px solid var(--line)}
.btn{background:var(--navy);color:#fff;border:none;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:.15s}
.btn:hover{background:var(--navy2)}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:hover{background:#f8fafc}
.btn:disabled{opacity:.35;cursor:default}

/* quiz */
.quiz{background:var(--card);border:2px dashed var(--soft-b);border-radius:14px;padding:20px 22px;margin:22px 0}
.quiz .q{font-weight:600;color:var(--navy);margin-bottom:12px}
.opt{display:block;width:100%;text-align:left;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin:7px 0;cursor:pointer;font-size:14px;transition:.15s}
.opt:hover{border-color:var(--green)}
.opt.right{background:var(--soft);border-color:var(--green);color:#14532d;font-weight:600}
.opt.wrong{background:#fef2f2;border-color:#fca5a5;color:#991b1b}
.quiz .fb{margin-top:10px;font-size:13.5px;padding:10px 14px;border-radius:8px;display:none}
.quiz .fb.show{display:block}

/* mobile */
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:40;background:var(--navy);color:#fff;border:none;width:44px;height:44px;border-radius:10px;font-size:20px;cursor:pointer}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:15}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .progress-bar{left:0}
  .menu-btn{display:block}
  .overlay.show{display:block}
  .content{padding:70px 20px 100px}
  .hero{padding:30px 22px}
  .hero h1{font-size:23px}
}
</style>
</head>
<body>
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<script>
/* ---------- RENDER ---------- */
const content = document.getElementById('content');
const nav = document.getElementById('nav');
let current = 0;

// zbuduj menu z podziałem na części
let lastPart = null;
COURSE.forEach((m,i)=>{
  if(m.part!==lastPart){
    const p=document.createElement('div');p.className='nav-part';p.textContent=m.part;nav.appendChild(p);lastPart=m.part;
  }
  const a=document.createElement('a');a.href='#'+m.id;a.textContent=m.nav;a.dataset.i=i;
  a.onclick=e=>{e.preventDefault();go(i);if(window.innerWidth<=900)toggleMenu();};
  nav.appendChild(a);
});

// wyrenderuj wszystkie moduły
content.innerHTML = COURSE.map((m,i)=>{
  const body = (typeof CONTENT!=='undefined' && CONTENT[m.id]) ? CONTENT[m.id] : '<p>—</p>';
  const prev = i>0 ? `<button class="btn ghost" onclick="go(${i-1})">← ${COURSE[i-1].nav}</button>` : '<span></span>';
  const next = i<COURSE.length-1 ? `<button class="btn" onclick="go(${i+1})">${COURSE[i+1].nav} →</button>` : '<span></span>';
  return `<section class="module" id="${m.id}">${body}<div class="pager">${prev}${next}</div></section>`;
}).join('');

function go(i){
  current=i;
  document.querySelectorAll('.module').forEach(el=>el.classList.remove('show'));
  document.getElementById(COURSE[i].id).classList.add('show');
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',+a.dataset.i===i));
  document.getElementById('prog').style.width = ((i)/(COURSE.length-1)*100)+'%';
  window.scrollTo({top:0,behavior:'smooth'});
  localStorage.setItem('akad_pos',i);
}
function toggleMenu(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('show');}
function toggleAcc(el){el.parentElement.classList.toggle('open');}
function quizPick(btn,ok,fbRight,fbWrong){
  const box=btn.closest('.quiz');
  box.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  btn.classList.add(ok?'right':'wrong');
  const fb=box.querySelector('.fb');fb.classList.add('show');
  fb.style.background=ok?'#f0fdf4':'#fef2f2';fb.style.color=ok?'#14532d':'#991b1b';
  fb.innerHTML=ok?('✓ '+fbRight):('✗ '+fbWrong);
  if(!ok){box.querySelectorAll('.opt').forEach(o=>{if(o.dataset.ok==='1')o.classList.add('right');});}
}
// start na zapisanej pozycji
go(parseInt(localStorage.getItem('akad_pos')||'0'));
</script>
